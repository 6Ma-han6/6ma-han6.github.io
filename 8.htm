<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马涵，我喜欢你</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            height: 100vh;
            background: #050510;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        canvas { position: absolute; top: 0; left: 0; }
        .content {
            position: absolute;
            z-index: 10;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1.5s ease;
            text-align: center;
        }
        .show { opacity: 1; transform: translateY(0); }
        .main {
            font-size: 32px;
            color: #ff4d6d;
            letter-spacing: 3px;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255,77,109,0.6);
        }
        .phone { font-size: 20px; color: #fff; margin-bottom: 20px; }
        .sign { font-size: 18px; color: #ccc; text-align: right; margin-bottom: 25px; padding-right: 10px; }
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }
        .btn-wechat { background: #07C160; color: white; }
        .btn-call { background: #ff4d6d; color: white; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="content" id="content">
        <div class="main">马涵，我喜欢你</div>
        <div class="phone">18076940632</div>
        <div class="sign">——薛明浩</div>
        <div class="btn-group">
            <a href="https://work.weixin.qq.com/ca/cawcdeb5ec8d1129e8" class="btn btn-wechat" target="_blank">添加微信</a>
            <a href="tel:18076940632" class="btn btn-call">电话联系</a>
        </div>
    </div>

        const ctx = canvas.getContext('2d');

        let h = canvas.height = window.innerHeight;

        const GATHER = 30000;
        const ROTATE = 10000;
        const EXPLODE = 2000;

        let particles = [];
        let heart = [];
        let start = Date.now();
        let state = 'gathering';

        // 生成爱心点阵
        function makeHeart() {
            const scale = Math.min(w,h)*0.15;
            const cx = w/2, cy = h/2;
            for(let t=0; t<Math.PI*2; t+=0.02) {
                let x = 16*Math.pow(Math.sin(t),3);
                let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
                heart.push({x: cx+x*scale, y: cy+y*scale});
            }
        }

                this.vy = -Math.random()*2-1;
                this.size = Math.random()*2+1;
                this.target = null;
                this.settled = false;
                this.exploded = false;
                this.alpha = 1;
            }
            update() {
                if(state === 'gathering') {
                    if(this.settled) return;
                    if(this.target) {
                        let dx = this.target.x - this.x;
                        let dy = this.target.y - this.y;
                        let d = Math.sqrt(dx*dx+dy*dy);
                        if(d<5) {
                            this.x = this.target.x;
                            this.y = this.target.y;
                            this.settled = true;
                        } else {
                            this.x += dx*0.06;
                            this.y += dy*0.06;
                        }
                    } else {
                        this.vx += (Math.random()-0.5)*0.2;
                        this.vy += (Math.random()-0.3)*0.1;
                        this.vx *= 0.98;
                        this.vy *= 0.98;
                        this.x += this.vx;
                        this.y += this.vy;
