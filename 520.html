<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马涵，我喜欢你</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #0a0a1a;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .msg-box {
            opacity: 0;
            transition: opacity 1.5s ease;
            text-align: center;
            z-index: 10;
        }
        .show-msg {
            opacity: 1;
        }
        .main-text {
            font-size: 36px;
            color: #ff5577;
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 0 0 15px #ff4466;
        }
        .sign-text {
            font-size: 22px;
            color: #cccccc;
            text-align: right;
            padding-right: 20px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="msg-box" id="msgBox">
        <div class="main-text">马涵，我喜欢你</div>
        <div class="sign-text">——薛明浩</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msgBox = document.getElementById('msgBox');

        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        const particles = [];
        const heartPoints = [];
        const totalParticles = 300;
        let state = 'gathering'; // gathering → rotating → exploding → done
        let stateTimer = 0;
        let rotationAngle = 0;

        // 爱心点阵生成
        function createHeartPoints() {
            const scale = Math.min(w, h) * 0.12;
            const centerX = w / 2;
            const centerY = h / 2;
            for (let i = 0; i < Math.PI * 2; i += 0.1) {
                const x = 16 * Math.pow(Math.sin(i), 3);
                const y = -(13 * Math.cos(i) - 5 * Math.cos(2 * i) - 2 * Math.cos(3 * i) - Math.cos(4 * i));
                heartPoints.push({
                    x: centerX + x * scale,
                    y: centerY + y * scale
                });
            }
        }

        // 粒子类
        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * w;
                this.y = h + Math.random() * 100;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -Math.random() * 1 - 0.5;
                this.size = Math.random() * 3 + 1;
                this.color = `rgba(255, 68, 102, ${Math.random() * 0.5 + 0.5})`;
                this.target = null;
                this.settled = false;
            }
            update() {
                if (state === 'gathering') {
                    if (this.settled) return;
                    if (this.target) {
                        const dx = this.target.x - this.x;
                        const dy = this.target.y - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 3) {
                            this.x = this.target.x;
                            this.y = this.target.y;
                            this.settled = true;
                        } else {
                            this.x += dx * 0.05;
                            this.y += dy * 0.05;
                        }
                    } else {
                        this.vx += (Math.random() - 0.5) * 0.1;
                        this.vy += (Math.random() - 0.1) * 0.05;
                        this.x += this.vx;
                        this.y += this.vy;
                        if (this.y < 0 || this.x < 0 || this.x > w) {
                            this.reset();
                        }
                    }
                } else if (state === 'rotating') {
                    if (!this.settled) return;
                    const dx = this.x - w/2;
                    const dy = this.y - h/2;
                    const newX = w/2 + dx * Math.cos(0.02) - dy * Math.sin(0.02);
                    const newY = h/2 + dx * Math.sin(0.02) + dy * Math.cos(0.02);
                    this.x = newX;
                    this.y = newY;
                } else if (state === 'exploding') {
                    if (!this.exploded) {
                        this.vx = (this.x - w/2) * 0.1;
                        this.vy = (this.y - h/2) * 0.1;
                        this.exploded = true;
                    }

                    this.y += this.vy;
