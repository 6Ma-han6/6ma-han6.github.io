<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6ma-han6 的小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 420px;
            width: 100%;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .bio {
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            display: block;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">👋</div>
        <h1>Hi, 我是 6ma-han6</h1>
        <p class="bio">
            欢迎来到我的个人主页<br>
            这里是我的小天地，记录一些生活与学习
        </p>
        <div class="links">
            <a href="#" class="link-btn">关于我</a>
            <a href="#" class="link-btn">我的项目</a>
            <a href="#" class="link-btn">联系方式</a>
        </div>
    </div>
</body>
</html>
