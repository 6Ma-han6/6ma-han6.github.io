<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>LX AI 个人主页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{min-height:100vh;background:#0a0a14;color:#fff;display:flex;align-items:center;justify-content:center;padding:20px}
.bg{position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,rgba(100,80,255,0.1),transparent 60%);z-index:-1}
.card{width:100%;max-width:400px;background:rgba(20,20,35,0.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:35px 25px;text-align:center;box-shadow:0 0 35px rgba(90,70,240,0.25)}
.avatar{width:100px;height:100px;margin:0 auto 20px;border-radius:50%;background:linear-gradient(135deg,#5c6cf0,#824fc9);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:bold;animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
h1{font-size:24px;background:linear-gradient(90deg,#6c7dff,#a074e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.desc{color:#b0b0c8;font-size:14px;margin-bottom:30px}
.btn{display:block;text-decoration:none;border-radius:12px;padding:14px 0;font-size:16px;font-weight:500;margin-bottom:12px;transition:all 0.2s}
.ai{background:linear-gradient(135deg,#5c6cf0,#824fc9);color:#fff}
.ai:active{transform:translateY(-2px);box-shadow:0 8px 20px rgba(92,108,240,0.35)}
.blog{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15)}
.contact{display:flex;gap:10px;margin-top:8px}
.contact a{flex:1;background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:12px 0}
.footer{margin-top:25px;color:#777;font-size:12px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="card">
<div class="avatar">LX</div>
<h1>LX AI 智能助手</h1>
<p class="desc">智能对话 | 技术服务 | 个人博客</p>

<a href="http://43.226.44.27:8080/chat/f1379e6347c9859d" class="btn ai" target="_blank">💬 进入AI对话</a>
<a href="http://43.226.44.27:8090" class="btn blog" target="_blank">📝 访问个人博客</a>

<div class="contact">
<a href="tel:18076940632">📞 电话联系</a>
<a href="https://work.weixin.qq.com/ca/cawcdeb5ec8d1129e8" target="_blank">💬 企业微信</a>
</div>

<div class="footer">© 2026 LX AI · 成都LX科技</div>
</div>

<script>
const bg=document.querySelector('.bg');
for(let i=0;i<12;i++){
let d=document.createElement('div');
d.style=`position:absolute;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;
background:rgba(255,255,255,${Math.random()*0.25});border-radius:50%;
top:${Math.random()*100}%;left:${Math.random()*100}%;
animation:fly ${Math.random()*8+8}s infinite linear`;
bg.appendChild(d);
}
const s=document.createElement('style');
s.textContent=`@keyframes fly{0%{transform:translateY(0);opacity:0}15%{opacity:1}85%{opacity:1}100%{transform:translateY(-100vh);opacity:0}}`;
document.head.appendChild(s);
</script>
</body>
</html>
